sonar.projectKey=Rodrigoruiz12_RoTSu
sonar.projectName=Rodrigoruiz12_RoTSu
sonar.organization=rodrigoruiz12

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,test-lucide.ts,src/APITester.tsx,scripts/**,terraform/**,k8s/**,.github/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.coverage.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/test/**,**/*.test.tsx,**/*.test.ts,src/frontend.tsx,test-lucide.ts,src/APITester.tsx,scripts/**,terraform/**,k8s/**,.github/**

sonar.issuesExclusionsResolved=false
sonar.qualitygate.wait=false

# Detección de código duplicado
sonar.cpd.exclusions=**/*.test.tsx,**/*.test.ts

# Métricas clave para IE3 dashboard
sonar.coverage.minimumLines=70

# Excluir del análisis los archivos de configuración YAML/HCL/Shell
# (los security hotspots en scripts/terraform son falsos positivos de DevOps)

# Exclusiones específicas de security hotspots (propiedad independiente)
sonar.security.hotspots.exclusions=**/scripts/**,**/terraform/**,**/k8s/**,**/.github/**,test-lucide.ts,src/APITester.tsx,src/test/**

sonar.issue.ignore.multicriteria=S1
sonar.issue.ignore.multicriteria.S1.ruleKey=typescript:S1186
sonar.issue.ignore.multicriteria.S1.resourceKey=src/test/setup.ts
