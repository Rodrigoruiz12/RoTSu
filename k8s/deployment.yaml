apiVersion: apps/v1
kind: Deployment
metadata:
  name: rotsu-frontend
  namespace: rotsu
  labels:
    app: rotsu-frontend
    app.kubernetes.io/name: rotsu-frontend
    app.kubernetes.io/part-of: rotsu-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rotsu-frontend
  template:
    metadata:
      labels:
        app: rotsu-frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nginx
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true

        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.4.0
          imagePullPolicy: IfNotPresent
          args:
            - "-nginx.scrape-uri=http://localhost/stub_status"
            - "-web.listen-address=:9113"
            - "-web.telemetry-path=/metrics"
          ports:
            - name: metrics
              containerPort: 9113
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: nginx-config
          configMap:
            name: rotsu-nginx-config
            items:
              - key: default.conf
                path: default.conf

      terminationGracePeriodSeconds: 30
