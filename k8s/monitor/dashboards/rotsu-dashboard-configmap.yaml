apiVersion: v1
kind: ConfigMap
metadata:
  name: rotsu-grafana-dashboard
  namespace: monitoring
  labels:
    app: rotsu-grafana-dashboard
    app.kubernetes.io/part-of: rotsu-platform
    # Label requerida por el sidecar dashboards de Grafana (kube-prometheus-stack)
    grafana_dashboard: "1"
data:
  rotsu-dashboard.json: |
    {
      "annotations": { "list": [] },
      "description": "Dashboard de observabilidad para el microservicio RoTSu - IE3 Ev3",
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 80 }] }, "unit": "s" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [{ "datasource": "Prometheus", "expr": "rotsu_deploy_duration_seconds{job=\"rotsu-ci\"}", "legendFormat": "Tiempo de despliegue (s)", "refId": "A" }],
          "title": "Tiempo de Despliegue",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 60 }, { "color": "green", "value": 70 }] }, "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [{ "datasource": "Prometheus", "expr": "rotsu_test_coverage_percent{job=\"rotsu-ci\"}", "legendFormat": "{{type}}", "refId": "A" }],
          "title": "Cobertura de Pruebas (%)",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit" }, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "none" } },
          "targets": [
            { "datasource": "Prometheus", "expr": "1 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))", "legendFormat": "CPU usado %", "refId": "B" }
          ],
          "title": "Uso de CPU",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "bytes" }, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "none" } },
          "targets": [
            { "datasource": "Prometheus", "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes", "legendFormat": "Memoria usada", "refId": "B" },
            { "datasource": "Prometheus", "expr": "node_memory_MemAvailable_bytes", "legendFormat": "Memoria disponible", "refId": "A" }
          ],
          "title": "Uso de Memoria",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] }, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 18 },
          "id": 5,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": "Prometheus", "expr": "rotsu_pipeline_errors_total{job=\"rotsu-ci\"}", "legendFormat": "Errores del pipeline", "refId": "A" },
            { "datasource": "Prometheus", "expr": "sum(nginx_connections_active)", "legendFormat": "Conexiones Nginx activas", "refId": "B" }
          ],
          "title": "Errores Registrados y Conexiones",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "bars", "fillOpacity": 50, "stacking": { "group": "A", "mode": "normal" } }, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 26 },
          "id": 6,
          "options": { "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "none" } },
          "targets": [{ "datasource": "Prometheus", "expr": "sum by (status) (rate(nginx_http_requests_total[5m]))", "legendFormat": "HTTP {{status}}", "refId": "A" }],
          "title": "Requests HTTP por codigo de estado",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["rotsu", "observabilidad", "ev3"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "",
      "title": "RoTSu - Observabilidad Microservicio",
      "uid": "rotsu-observabilidad",
      "version": 1
    }
