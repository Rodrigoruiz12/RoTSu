name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop, 'release/*']

permissions:
  contents: read
  id-token: write
  statuses: write

jobs:
  
  # Job 1: Build, lint y tests con coverage
  
  build-and-test:
    name: Build & Test (coverage)
    runs-on: ubuntu-latest
    outputs:
      coverage-lines: ${{ steps.coverage.outputs.lines }}
      coverage-branches: ${{ steps.coverage.outputs.branches }}
      coverage-functions: ${{ steps.coverage.outputs.functions }}
      coverage-statements: ${{ steps.coverage.outputs.statements }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage (Inside Docker - IE7)
        run: |
          # 1. Construye el contenedor hasta la fase 'test' (ejecutando pruebas unitarias dentro del contenedor)
          docker build --target test -t rotsu-test .
          # 2. Extrae el reporte de coverage generado dentro del contenedor para pasarlo a SonarCloud
          docker create --name extract-test rotsu-test
          docker cp extract-test:/app/coverage ./coverage
          docker rm extract-test
      - name: Build Application
        run: npm run build

      - name: Extract coverage metrics
        id: coverage
        run: |
          LINES=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          BRANCHES=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)
          FUNCTIONS=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)
          STATEMENTS=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "::notice::Coverage - Lines: $LINES% | Branches: $BRANCHES% | Functions: $FUNCTIONS% | Statements: $STATEMENTS%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  
  # Job 2: SonarCloud Quality Gate (IE5/IE6)
  
  sonarcloud:
    name: SonarCloud Quality Gate
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  
  # Job 3: Snyk Security Scan (IE5/IE6)
  
  snyk-security:
    name: Snyk Security Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
        continue-on-error: false

  
  # Job 4: Auditoría de cumplimiento (IE5/IE6)
  
  audit-compliance:
    name: Compliance Audit
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install hadolint
        run: |
          curl -sL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Run Compliance Audit
        run: bash scripts/audit.sh
  
  # Job 5: Build & Push Docker image a Docker Hub (solo main/develop)
  
  build-and-push:
    name: Build & Push to Docker Hub
    needs: [build-and-test, sonarcloud, snyk-security, audit-compliance]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image metadata
        id: meta
        run: |
          DOCKER_URL="${{ secrets.DOCKER_USERNAME }}/rotsu-frontend"
          TAG="sha-${GITHUB_SHA::7}"
          echo "image-url=$DOCKER_URL" >> $GITHUB_OUTPUT
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "::notice::Imagen: $DOCKER_URL:$TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image-url }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image-url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  
  # Job 5.5: Pruebas de Aceptacion (IE13)
  
  acceptance-tests:
    name: Acceptance Tests
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Acceptance Tests
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/rotsu-frontend:${{ needs.build-and-push.outputs.image-tag }}
        run: bash scripts/acceptance-test.sh

  
  # Job 6: Terraform Apply (solo main) - provisiona/actualiza AWS infra
  
  terraform-apply:
    name: Terraform Apply (AWS)
    needs: [build-and-push, acceptance-tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    outputs:
      k8s_instance_id: ${{ steps.outputs.outputs.k8s_instance_id }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Format
        id: fmt
        run: terraform -chdir=terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform -chdir=terraform validate

      - name: Terraform Apply
        id: apply
        run: terraform -chdir=terraform apply -auto-approve -input=false

      - name: Get instance ID for downstream jobs
        id: outputs
        run: |
          INSTANCE_ID=$(terraform -chdir=terraform output -raw k8s_instance_id)
          echo "k8s_instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "::notice::k8s instance ID: $INSTANCE_ID"

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: terraform/kubeconfig.yaml


  # Job 7: Deploy K8s + Publish CI metrics (solo main)
  # El kubeconfig se lee directamente de SSM Parameter Store (no se baja artifact)
  deploy-k8s:
    name: Deploy to Kubernetes
    needs: [terraform-apply, build-and-push, build-and-test, acceptance-tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Setup Docker Hub URL
        id: ecr
        run: echo "url=${{ secrets.DOCKER_USERNAME }}/rotsu-frontend" >> $GITHUB_OUTPUT

      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v4
        with:
          name: kubeconfig
          path: terraform

      - name: Get instance public IP (via AWS API, no SSH needed)
        id: ip
        run: |
          # Usar AWS API para describir la instancia (no requiere SSH ni SSM)
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=rotsu-k8s-node" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          if [ -z "$IP" ] || [ "$IP" = "None" ]; then
            echo "::error::No se encontro IP publica para la instancia Kubernetes"
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "::notice::k8s node IP: $IP"

      - name: Terraform Init K8s (lee kubeconfig de SSM Parameter)
        run: terraform -chdir=terraform/k8s init -backend=false

      - name: Terraform Apply K8s
        id: deploy
        env:
          TF_VAR_image_repo: ${{ steps.ecr.outputs.url }}
          TF_VAR_image_tag: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          START=$(date +%s)
          terraform -chdir=terraform/k8s apply -auto-approve -input=false
          END=$(date +%s)
          echo "deploy-duration=$((END - START))" >> $GITHUB_OUTPUT



      - name: Publish CI metrics to Pushgateway
        if: always()
        env:
          PUSHGATEWAY_URL: http://${{ steps.ip.outputs.ip }}:9091
        run: |
          PIPELINE_STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then
            PIPELINE_STATUS="failure"
          fi
          bash scripts/publish-ci-metrics.sh \
            --pushgateway-url="$PUSHGATEWAY_URL" \
            --deploy-duration=${{ steps.deploy.outputs.deploy-duration || 0 }} \
            --coverage-lines=${{ needs.build-and-test.outputs.coverage-lines || 0 }} \
            --coverage-branches=${{ needs.build-and-test.outputs.coverage-branches || 0 }} \
            --coverage-functions=${{ needs.build-and-test.outputs.coverage-functions || 0 }} \
            --coverage-statements=${{ needs.build-and-test.outputs.coverage-statements || 0 }} \
            --pipeline-status="$PIPELINE_STATUS" \
            --errors=0 || echo "::warning::No se pudieron publicar metricas (Pushgateway no disponible)"
